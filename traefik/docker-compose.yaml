services:
  traefik:
    container_name: traefik
    image: traefik:3.0.1
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yaml:/etc/traefik/traefik.yaml:ro
    networks:
      - frontend
      - backend
    restart: unless-stopped
networks:
  frontend:
    external: true
  backend:
    external: true